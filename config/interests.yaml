# =============================================================================
# YOUR NEWSLETTER INTERESTS - Customize this file!
# =============================================================================
#
# This file defines what content gets included in your daily newsletter.
# Each "interest" is a category with a list of RSS/Atom feed URLs.
#
# How to find RSS feeds:
#   - Most blogs have /feed or /rss in the URL
#   - News sites often have /rss or /feeds/
#   - Use Feedly or similar to discover feeds
#
# Example structure:
#   interests:
#     - name: "Category Name"
#       feeds:
#         - url: "https://example.com/feed"
#           max_items: 5   # Optional: limit items per feed (default: 5)
# =============================================================================

interests:
  - name: "AI News"
    feeds:
      - url: "https://planet-ai.net/rss.xml"
        max_items: 4
      - url: "https://huggingface.co/blog/feed.xml"
        max_items: 3
      - url: "https://deepmind.google/blog/rss.xml"
        max_items: 3

  - name: "Sports News"
    feeds:
      - url: "https://www.espn.com/espn/rss/news"
        max_items: 4
      - url: "https://sports.yahoo.com/rss/"
        max_items: 4
      - url: "https://www.cbssports.com/rss/headlines/"
        max_items: 3

  - name: "Forecasting & Analysis"
    feeds:
      - url: "https://www.natesilver.net/feed"
        max_items: 3
      - url: "https://www.electoral-vote.com/index2.rss"
        max_items: 2
      - url: "https://www.noahpinion.blog/feed"
        max_items: 2
